<!doctype html>
<html lang="en">

<head>
<title>Happy Job | Contact View</title>

<link rel="stylesheet" href="assets/css/messages.css">
</head>

<body>
  <!--  Body Wrapper -->
  <div class="page-wrapper" id="main-wrapper" data-layout="vertical" data-navbarbg="skin6" data-sidebartype="full"
    data-sidebar-position="fixed" data-header-position="fixed">

    <aside class="left-sidebar">
      <div>
      <th:block th:insert="Admin/sidebar.html"></th:block>
      </div> 
    </aside>
 
    <div class="body-wrapper">
      <div>
       <th:block th:insert="Admin/header.html"></th:block>
      </div>
      <div class="container-fluid">
        <h1 style="text-align: center;" class="mt-4">Recent Messages</h1>
			<main class=" mt-4">
				<section id="message-list" class="list-group">
					<!-- Iterate over messages using Thymeleaf -->
					<div th:each="message : ${messages}"
						class="message list-group-item list-group-item-action" style="padding: 50px; max-width: 70vw;">
						<div class="d-flex w-100 justify-content-between">
							<h5 class="mb-1" th:text="${message.subject}">Message Title</h5>
							<small class="text-muted"><span><time class="timeago" th:datetime="${message.messageDate}"></time></span></small>
								
						</div>
						<div class="d-flex w-100 justify-content-between">
						<p style="padding-right: 100px" class="mb-1" th:text="${message.messages}">Message
							content...</p>
							<small class="text-muted"  th:text="${message.name}">Harishanakr sah</small>
							</div>
						<small class="text-muted" th:text="${message.email}">Additional details...</small>
						<button class="btn btn-sm btn-outline-primary mt-2 mark-read-btn">Mark
							as Read</button>
<a th:href="'mailto:' + ${message.email}">
<button  class="btn btn-sm btn-success mt-2">Reply</button></a>
					</div>
				</section>
			</main>
        
        
        
        <div class="py-6 px-6 text-center">
        <th:block th:insert="Admin/footer.html"></th:block>
          </div>
      </div>
    </div>
  </div>
  
  <script type="text/javascript">// scripts.js
    document.addEventListener('DOMContentLoaded', function() {
        const messages = document.querySelectorAll('.message');
        messages.forEach(message => {
            const markReadBtn = message.querySelector('.mark-read-btn');
            markReadBtn.addEventListener('click', () => {
                message.classList.toggle('read');
                markReadBtn.textContent = message.classList.contains('read') ? 'Mark as Unread' : 'Mark as Read';
            });
        });
    });
</script>
  </body>

</html>
