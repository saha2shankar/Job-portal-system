<!doctype html>
<html lang="en">

<head>
<title>Happy Job | Password Change</title>
<style type="text/css">
input, select{
	    min-height: 50px;
    margin-top: 10px;
}

</style>
</head>

<body>
  <!--  Body Wrapper -->
  <div class="page-wrapper" id="main-wrapper" data-layout="vertical" data-navbarbg="skin6" data-sidebartype="full"
    data-sidebar-position="fixed" data-header-position="fixed">

    <aside class="left-sidebar">
      <div>
      <th:block th:insert="Admin/sidebar.html"></th:block>
      </div> 
    </aside>
 
    <div class="body-wrapper">
      <div>
       <th:block th:insert="Admin/header.html"></th:block>
      </div>
      <div class="container-fluid">
        <div class="card">
          <div class="card-body">
            <div class="container my-4">
    <h2 class="text-center text-primary mb-4">Password Change</h2>
    <h4 class="text-center text-primary mb-4">[[${message}]]</h4>
    <form class="row g-3" action="/change-password" method="post" onsubmit="return validatePassword()">
    <!-- Old Password -->
    <div class="col-md-12">
        <label for="oldpassword" class="text-primary fw-bold">Old Password</label>
        <input class="form-control" type="password" id="oldpassword" name="oldpassword" required>
    </div>
    
    <!-- New Password -->
    <div class="col-md-12">
        <label for="newpassword" class="text-primary fw-bold">New Password</label>
        <input class="form-control" type="password" id="newpassword" name="newpassword" minlength="8" required>
        <small class="text-muted">Password must be at least 8 characters long</small>
    </div>

    <!-- Confirm New Password -->
    <div class="col-md-12">
        <label for="confirmnewpassword" class="text-primary fw-bold">Confirm New Password</label>
        <input class="form-control" type="password" id="confirmnewpassword" name="confirmnewpassword" required>
    </div>

    <!-- Submit Button -->
    <div class="col-12 text-center">
        <input type="hidden" name="id" th:value="${session.validuser.id}">                
        <input type="submit" value="Change Password" class="btn btn-primary w-50 py-2 fs-5">
    </div>
</form>

</div>
            
          </div>
        </div>
        <div class="py-6 px-6 text-center">
        <th:block th:insert="Admin/footer.html"></th:block>
          </div>
      </div>
    </div>
  </div>
  <script>
    function validatePassword() {
        var newPassword = document.getElementById("newpassword").value;
        var confirmPassword = document.getElementById("confirmnewpassword").value;

        if (newPassword !== confirmPassword) {
            alert("The new password and confirm password do not match.");
            return false; // Prevent form submission
        }
        
        return true; // Proceed with form submission
    }
</script>
  
  </body>

</html>
