<!doctype html>
<html class="no-js" lang="zxx">
    <head>
    <title>Coontact Page</title>
   </head>

   <body>
   
   <th:block th:insert="_header.html"></th:block>
    <main>
<!-- Hero Area Start-->
    <div class="slider-area ">
        <div class="single-slider section-overly slider-height2 d-flex align-items-center" data-background="Photo/contact.jpg">
            <div class="container">
                <div class="row">
                    <div class="col-xl-12">
                        <div class="hero-cap text-center">
                            <h2>Contact us</h2>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
        <!-- Hero Area End -->
    <!-- ================ contact section start ================= -->
    <section class="contact-section">
            <div class="container">
                <div class="d-none d-sm-block mb-5 pb-4">
                   <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3424.368569136832!2d85.9262027752649!3d26.726163476758877!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x39ec400871f156f9%3A0x6ff5677a6eb90718!2sModel%20Multiple%20College!5e1!3m2!1sen!2snp!4v1737207259012!5m2!1sen!2snp" width="100%" height="400" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
    
                <div class="row">
                    <div class="col-12">
                                               <p style="font-weight: 600; color: red;">[[${message}]]</p>
                    
                        <h2 class="contact-title">Get in Touch</h2>
                    </div>
                    <div class="col-lg-8">
                        <form class="form-contact contact_form" action="/contact" method="post" onsubmit="return handleSubmit(event)">
    <div class="row">
        <div class="col-12">
            <div class="form-group">
                <textarea class="form-control w-100" maxlength="1000" name="messages" cols="30" rows="9" placeholder=" Enter Message"></textarea>
            </div>
        </div>
        <div class="col-sm-6">
            <div class="form-group">
                <input class="form-control valid" name="name" id="name" type="text" placeholder="Enter your name">
            </div>
        </div>
        <div class="col-sm-6">
            <div class="form-group">
                <input class="form-control valid" name="email" id="email" type="email" placeholder="Email">
            </div>
        </div>
        <div class="col-12">
            <div class="form-group">
                <input class="form-control" name="subject" id="subject" type="text" placeholder="Enter Subject">
            </div>
        </div>
    </div>
    <div class="form-group mt-3">
        <button type="submit" class="button button-contactForm boxed-btn">Send</button>
    </div>
</form>
                    </div>
                    <div class="col-lg-3 offset-lg-1">
                        <div class="media contact-info">
                            <span class="contact-info__icon"><i class="ti-home"></i></span>
                            <div class="media-body">
                                <h3>Janakpur, kandam chowak.</h3>
                                <p>Madhesh Province, NEPAL</p>
                            </div>
                        </div>
                        <div class="media contact-info">
                            <span class="contact-info__icon"><i class="ti-tablet"></i></span>
                            <div class="media-body">
                                <h3>+977 9800000000</h3>
                                <p>Mon to Fri 9am to 6pm</p>
                            </div>
                        </div>
                        <div class="media contact-info">
                            <span class="contact-info__icon"><i class="ti-email"></i></span>
                            <div class="media-body">
                                <h3>support@happyjob.com</h3>
                                <p>Send us your query anytime!</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

<!-- Success Modal -->
<div class="modal fade" id="successModal" tabindex="-1" aria-labelledby="successModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="successModalLabel">Message Sent</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                Your message has been successfully sent. Thank you for contacting us!
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="closeButton">Close</button>
            </div>
        </div>
    </div>
</div>


<script>
    async function handleSubmit(event) {
        event.preventDefault(); // Prevent default form submission

        // Get the form data
        const form = event.target;
        const formData = new FormData(form);

        try {
            // Make an asynchronous POST request to the server
            const response = await fetch(form.action, {
                method: 'POST',
                body: formData
            });

            // Check if the request was successful
            if (response.ok) {
                // Show success modal
                const modal = new bootstrap.Modal(document.getElementById('successModal'));
                modal.show();

                // Optionally reset the form after submission
                form.reset();
            } else {
                // Handle server errors (if needed)
                alert("An error occurred while submitting the form. Please try again.");
            }
        } catch (error) {
            console.error('Error occurred during form submission:', error);
            alert('An unexpected error occurred. Please try again.');
        }
    }

    // Redirect when Close button is clicked
    document.getElementById('closeButton').addEventListener('click', function() {
        window.location.href = '/'; // Redirect to home page or desired URL
    });
</script>
    </main>
    
       
      <th:block th:insert="_footer.html"></th:block> 
    </body>
</html>
