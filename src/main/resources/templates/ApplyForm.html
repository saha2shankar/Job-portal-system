<!doctype html>
<html class="no-js" lang="zxx">
    <head>
    <title>Apply form</title>
    
     <style>
       
        .form-container {
            margin: 50px auto;
            padding: 30px;
            border-radius: 8px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .form-title {
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
        }
        
        input,textarea {
	min-height: 60px;
	margin: 100px;
	
}

.text-color{
    font-weight: 700;
    color: #fb246a !important;
    padding-top: 10px;
}

    </style>
   </head>

   <body>
   
   <th:block th:insert="_header.html"></th:block>
  <div class="container">
        <div class="form-container">
            <div class="form-title">Job Vacancy Application</div>
            <form id="jobForm" action="/apply" method="POST" enctype="multipart/form-data" onsubmit="handleSubmit(event)">
                
                <div class="row g-4">
                    <div class="col-md-6">
                        <label for="fullName" class="form-label text-color">Full Name *</label>
                        <input type="text" class="form-control" id="fullName" name="fullName" placeholder="Enter your full name" required>
                    </div>
                    <div class="col-md-6">
                        <label for="email" class="form-label text-color">Email Address *</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email" required>
                    </div>
                    <div class="col-md-6">
                        <label for="phone" class="form-label text-color">Phone Number *</label>
                        <input type="tel" class="form-control" id="phone" name="phone" placeholder="Enter your phone number" required>
                    </div>
                    <div class="col-md-6">
                        <label for="address" class="form-label text-color">Address *</label>
                        <input type="text" class="form-control" id="address" name="address" placeholder="Enter your address" required>
                    </div>
                    <div class="col-md-6">
                        <label for="position" class="form-label text-color">Position Applied For *</label>
                        <input type="text" class="form-control" id="position" name="position" th:value="${job.title}" readonly="readonly" placeholder="Position" required>
                    </div>
                    <div class="col-md-6">
                        <label for="companyName" class="form-label text-color">Company Name *</label>
                        <input type="text" class="form-control" id="companyName" th:value="${job.companyName}" name="companyName" placeholder="Enter Company Name" required readonly="readonly">
                    </div>
                    <div class="col-md-12">
                        <label for="coverLetter" class="form-label text-color">Cover Letter *</label>
                        <textarea class="form-control" id="coverLetter" maxlength="1000" name="coverLetter" rows="6" placeholder="Write a brief cover letter" required></textarea>
                    </div>
                    <div class="col-md-6">
                        <label for="resume" class="form-label text-color">Upload Resume *</label>
                        <input type="file" class="form-control" id="resume" name="cv" accept=".pdf,.doc,.docx" required>
                    </div>
                    <div class="col-md-6">
                        <label for="portfolio" class="form-label text-color">Portfolio Website (Optional)</label>
                        <input type="url" class="form-control" id="portfolio" name="portfolio" placeholder="https://example.com">
                    </div>
                </div>
                <div class="text-center mt-4">
                    <button type="submit" class="btn btn-primary w-100">Submit Application</button>
                </div>
            </form>
        </div>
    </div>


   <!-- Success Modal -->
<div class="modal fade" id="successModal" tabindex="-1" aria-labelledby="successModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="successModalLabel">Application Submitted</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                Thank you for applying! Your application has been successfully submitted.
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<!-- Error Modal -->
<div class="modal fade" id="errorModal" tabindex="-1" aria-labelledby="errorModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="errorModalLabel">Error</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                An error occurred, please try again.
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>
    <input type="hidden" id="jobId" th:value="${job.id}" />


    <!-- Include Bootstrap JS and Popper -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>

 <script>
    async function handleSubmit(event) {
        event.preventDefault(); // Prevent default form submission

        const form = event.target; // The form element
        const formData = new FormData(form); // Collect form data
        const jobId ='[[${job.id}]]'; // Dynamically inject jobId

        try {
            // Make the POST request
            const response = await fetch(form.action, {
                method: "POST",
                body: formData,
            });

            if (response.ok) {
                // Success: Show success modal
                const successModal = new bootstrap.Modal(document.getElementById("successModal"));
                successModal.show();

                // Redirect to /home when "Close" button is clicked
                document.querySelector('#successModal .btn-secondary').addEventListener('click', () => {
                    window.location.href = "/";
                });
            } else {
                // Error: Show error modal
                const errorModal = new bootstrap.Modal(document.getElementById("errorModal"));
                errorModal.show();

                // Re-show the form if the error modal is closed
                document.querySelector('#errorModal .btn-close').addEventListener('click', () => {
                	 const jobId = document.getElementById("jobId").value;
                     window.location.href = `/apply?id=${jobId}`;
                });
                document.querySelector('#errorModal .btn-secondary').addEventListener('click', () => {
                	 const jobId = document.getElementById("jobId").value;
                     window.location.href = `/apply?id=${jobId}`;
                });
            }
        } catch (error) {
            console.error("Error occurred during submission:", error);

            // Show error modal
            const errorModal = new bootstrap.Modal(document.getElementById("errorModal"));
            errorModal.show();

            // Re-show the form if the error modal is closed
            document.querySelector('#errorModal .btn-close').addEventListener('click', () => {
                form.style.display = "block";
            });
            document.querySelector('#errorModal .btn-secondary').addEventListener('click', () => {
                form.style.display = "block";
            });
        }
    }
</script>


       
      <th:block th:insert="_footer.html"></th:block> 
    </body>
</html>
